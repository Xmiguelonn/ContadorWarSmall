<!doctype html>
<!-- saved from url=(0042)https://srbaldiiegx.github.io/ContadorWar/ -->
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <title>Marcador PokeMMO</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        display: grid;
        place-items: center;
      }

      .card-container {
        display: flex;
        gap: 30px;
      }

      .card {
        width: 300px;
        height: auto;
        border-radius: 25px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        box-sizing: border-box;
      }

      /**.card-verde {
        background: radial-gradient(circle, #0a1410, #030806);
        border: 3px solid #00c853;
        box-shadow: 0 0 15px #00c8534d;
      }

      .card-azul {
        background: radial-gradient(circle, #0a1114, #030608);
        border: 3px solid #2979ff;
        box-shadow: 0 0 15px #2979ff4d;
      }

      .card-roja {
        background: radial-gradient(circle, #140a0a, #080303);
        border: 3px solid #ff1744;
        box-shadow: 0 0 15px #ff17444d;
      } **/

      .card-verde {
        background: linear-gradient(to top, black 70%, #00c853);
        border: 3px solid #00c853;
        box-shadow: 0 0 15px #00c8534d;
      }

      .card-azul {
        background: linear-gradient(to top, black 70%, #2979ff);
        border: 3px solid #2979ff;
        box-shadow: 0 0 15px #2979ff4d;
      }

      .card-roja {
        background: linear-gradient(to top, black 70%, #ff1744);
        border: 3px solid #ff1744;
        box-shadow: 0 0 15px #ff17444d;
      }

      .card-verde .team-name,
      .card-verde .score {
        color: #00c853;
      }

      .card-verde .score-container {
        border-top: 2px solid #00c853;
      }

      .card-azul .team-name,
      .card-azul .score {
        color: #2979ff;
      }

      .card-azul .score-container {
        border-top: 2px solid #2979ff;
      }

      .card-roja .team-name,
      .card-roja .score {
        color: #ff1744;
      }

      .card-roja .score-container {
        border-top: 2px solid #ff1744;
      }


      .team-name {
        font-size: 18px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 0px;
        margin-bottom: 10px;
        text-shadow: 1px 1px 3px #0008;
        font-family: "Press Start 2P", system-ui, sans-serif;
      }

      .score-container {
        width: 80%;
        border-top: 2px solid #ffffff4d;
        padding-top: 30px;
        margin-bottom: 20px;
        margin-top: 10px;
      }

      .score {
        font-size: 72px;
        font-weight: bold;
        text-align: center;
        line-height: 1;
        text-shadow: 0 0 10px currentColor;
        transition: transform 0.15s ease;
        font-family: "Press Start 2P", system-ui, sans-serif;
      }

      @keyframes scoreBumpAnim {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.25);
        }
        60% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1);
        }
      }

      .score.bump {
        animation: scoreBumpAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .status {
        position: fixed;
        right: 12px;
        bottom: 8px;
        color: #fff9;
        font-size: 12px;
      }

      body.connected .status {
        display: none;
      }
    </style>
  </head>

  <body class="connected">
    <div class="card-container">
      <div class="card card-verde">
        <div class="team-name">Equipo verde</div>
        <div class="score-container">
          <div id="score-verde" class="score">0</div>
        </div>
      </div>
      <div class="card card-azul">
        <div class="team-name">Equipo azul</div>
        <div class="score-container">
          <div id="score-azul" class="score">0</div>
        </div>
      </div>
      <div class="card card-roja">
        <div class="team-name">Equipo rojo</div>
        <div class="score-container">
          <div id="score-rojo" class="score">0</div>
        </div>
      </div>
    </div>
    <div class="status">Conectando a Firebase...</div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
      import {
        getDatabase,
        ref,
        onValue,
      } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

      // Tu configuracion de Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDlC6cK0o7L99ZVNU1WpdeGVV6ym4rwpiw",
        authDomain: "contador2k26.firebaseapp.com",
        databaseURL:
          "https://contador2k26-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "contador2k26",
        storageBucket: "contador2k26.firebasestorage.app",
        messagingSenderId: "211348542156",
        appId: "1:211348542156:web:5518497309e5c2ec0aa869",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const scoresRef = ref(db, "puntos");

      const scoreElements = {
        rojo: document.querySelector("#score-rojo"),
        verde: document.querySelector("#score-verde"),
        azul: document.querySelector("#score-azul"),
      };

      const previousValues = { rojo: null, verde: null, azul: null };

      onValue(scoresRef, (snapshot) => {
        const data = snapshot.val() || {};
        Object.entries(scoreElements).forEach(([team, element]) => {
          const newValue = data[team] ?? 0;
          if (
            previousValues[team] !== null &&
            previousValues[team] !== newValue
          ) {
            element.classList.remove("bump");
            void element.offsetWidth; // reinicia la animacion
            element.classList.add("bump");
          }
          previousValues[team] = newValue;
          element.textContent = newValue;
        });
        document.body.classList.add("connected");
      });
    </script>
  </body>
</html>
